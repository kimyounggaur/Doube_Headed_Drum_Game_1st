<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 단청 배경 -->
  <rect width="64" height="64" rx="8" fill="#1a1a1a"/>
  <!-- 좌측 가죽(궁편) — 청 -->
  <ellipse cx="20" cy="32" rx="14" ry="18" fill="#1f3a5f" stroke="#e8b647" stroke-width="2"/>
  <!-- 우측 가죽(채편) — 적 -->
  <ellipse cx="44" cy="32" rx="14" ry="18" fill="#a91b0d" stroke="#e8b647" stroke-width="2"/>
  <!-- 중앙 가운데(통) -->
  <rect x="16" y="26" width="32" height="12" fill="#3a2010"/>
  <!-- 황색 끈 -->
  <rect x="18" y="29" width="28" height="2" fill="#e8b647"/>
  <rect x="18" y="33" width="28" height="2" fill="#e8b647"/>
</svg>
